name: vibeo
description: Vibeo - AI destekli sosyal içerik platformu
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Video
  video_player: ^2.8.1

  # Media Picker
  image_picker: ^1.1.0

  # State Management
  provider: ^6.1.2

  # Image caching
  cached_network_image: ^3.3.1

  # Time formatting
  timeago: ^3.6.1
  
  # Internationalization (fixes deprecation warning)
  intl: ^0.19.0

  # UUID for unique IDs
  uuid: ^4.4.0

  # HTTP requests (AI text API)
  http: ^1.2.1

  # Native splash screen
  flutter_native_splash: ^2.4.1

  # URL launcher (privacy policy, terms)
  url_launcher: ^6.3.0

  # Share content
  share_plus: ^10.0.0

  # In-app review
  in_app_review: ^2.0.9

  # Onboarding tamamlandı flag'i
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#03070D"
    theme_color: "#00FFFF"

flutter_native_splash:
  color: "#03070D"
  image: assets/icon/app_icon.png
  android_12:
    color: "#03070D"
    icon_background_color: "#03070D"
    image: assets/icon/app_icon.png
  web: false
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
