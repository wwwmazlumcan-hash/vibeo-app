name: vibeo
description: Vibeo - Short Video Sharing App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Video
  video_player: ^2.8.1

  # Media Picker
  image_picker: ^1.1.0

  # State Management
  provider: ^6.1.2

  # Image caching
  cached_network_image: ^3.3.1

  # Time formatting
  timeago: ^3.6.1

  # UUID for unique IDs
  uuid: ^4.4.0

  # HTTP requests (AI text API)
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#000000"
    theme_color: "#00FFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
